aid: path-robotics
name: Path Robotics
description: >-
  Path Robotics is a Columbus, Ohio autonomous welding robotics company
  founded in 2018 by brothers Andy and Alex Lonsberry (CEO and CTO) out of
  Case Western Reserve University. The company builds AI-powered intelligent
  welding cells that automate metal fabrication for defense shipyards,
  utility and energy infrastructure, data centers, and heavy industry.
  Its core technology is Obsidian, a physical-AI reinforcement-learning
  agent trained inside Path's proprietary Weld World Model on tens of
  millions of welded inches; Obsidian runs at the edge of each cell and
  makes real-time, seam-by-seam welding decisions using a sensor stack of
  two cameras plus four lasers that deliver sub-millimeter 360-degree
  awareness around the torch. Path markets the cells with a CapEx-free
  consumption model and reports 97%+ first-pass yield, 4x productivity,
  and 30% lower welding costs across customers including HII (America's
  largest military shipbuilder), Saronic, LAD Services, Tycrop, Mine Rite
  Technologies, and Millerbernd. In April 2026 Path announced Rove, a
  mobile welding system mounted on a quadruped platform, extending its
  addressable geometry beyond fixed-cell applications. The company has
  raised approximately $271M across Seed through Series D from Drive
  Capital, Matter Venture Partners, Tiger Global, Addition, and Yamaha
  Motor Ventures, with the most recent $100M Series D closing in October
  2024. Path Robotics has no public developer API, SDK, or webhook
  surface; its GitHub organization contains roughly 50 repositories
  that are almost entirely upstream open-source forks (ROS, protobuf,
  abseil, ceres-solver, pytorch3d, etc.) used as internal build
  dependencies rather than published developer artifacts. Revenue is
  earned through welding-cell deployments, services, and the consumable
  weld-output model — not API monetization.
